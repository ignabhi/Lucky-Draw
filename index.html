<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lucky Draw · Philips TVM Fun League '26</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --pink:        #cc0088;
    --pink-light:  #ff5bc0;
    --blue:        #1a75d1;
    --purple:      #9b8bd6;
    --purple-deep: #6c5ce7;
    --ink:         #2a2350;
    --ink-soft:    #6b6392;
    --ink-faint:   #8f88b4;
    --ok:          #12905a;
    --err:         #d1394b;
    --font: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(1100px 760px at 12% -12%, #ffe3f6 0%, transparent 55%),
      radial-gradient(1000px 700px at 112% 8%, #dcecff 0%, transparent 55%),
      radial-gradient(900px 700px at 50% 120%, #efe9ff 0%, transparent 60%),
      linear-gradient(160deg, #f7f4ff, #eef5ff);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    transition: background .4s ease;
  }

  /* ---------------- Dark mode ---------------- */
  body.dark {
    background:
      radial-gradient(1200px 820px at 8% -12%, rgba(204,0,136,.55), transparent 55%),
      radial-gradient(1100px 800px at 112% 4%, rgba(26,117,209,.5), transparent 55%),
      radial-gradient(1100px 820px at 50% 120%, rgba(108,92,231,.6), transparent 58%),
      linear-gradient(160deg, #1b1033, #120a24 60%, #0d0720);
  }
  body.dark .subtitle { color: rgba(255,255,255,.82); }
  body.dark .footer { color: rgba(255,255,255,.6); }
  body.dark .footer strong { color: #e9ddff; }

  /* floating decorative blobs */
  .blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: .35; z-index: 0; pointer-events: none; }
  .blob.b1 { width: 340px; height: 340px; background: #ff9ad8; top: -80px; left: -60px; animation: drift 14s ease-in-out infinite; }
  .blob.b2 { width: 300px; height: 300px; background: #8fbaff; bottom: -90px; right: -50px; animation: drift 18s ease-in-out infinite reverse; }
  @keyframes drift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-24px) scale(1.08); } }

  .app {
    position: relative;
    z-index: 1;
    max-width: 940px;
    height: 100dvh;
    margin: 0 auto;
    padding: clamp(10px, 2vh, 24px) 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(6px, 1.4vh, 16px);
    text-align: center;
    overflow: hidden;
  }

  /* ---------------- Brand ---------------- */
  .brand { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: clamp(-48px, -5vh, -16px);
    animation: enterUp .8s cubic-bezier(.2,.8,.25,1) both; }
  .brand img {
    width: clamp(96px, 13vh, 168px); max-width: 55vw; height: auto;
    filter: drop-shadow(0 10px 22px rgba(108, 92, 231, .28));
    animation: logoPop .9s cubic-bezier(.2,.9,.25,1.4) both, floaty 4s ease-in-out 1s infinite;
  }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }

  /* Page-load entrance */
  @keyframes enterUp {
    0%   { opacity: 0; transform: translateY(30px) scale(.97); filter: blur(6px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  @keyframes logoPop {
    0%   { opacity: 0; transform: translateY(-16px) scale(.6) rotate(-8deg); }
    60%  { opacity: 1; transform: translateY(0) scale(1.08) rotate(3deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }

  .title {
    font-size: clamp(24px, 5vh, 52px);
    font-weight: 900;
    letter-spacing: -.5px;
    margin: 4px 0 0;
    background: linear-gradient(90deg, var(--pink), var(--purple-deep), var(--blue));
    background-size: 220% auto;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { to { background-position: 220% center; } }

  .subtitle {
    font-size: clamp(11px, 2.4vw, 15px);
    font-weight: 700; color: var(--ink-soft);
    margin: 6px 0 0; text-transform: uppercase; letter-spacing: 4px;
  }

  /* ---------------- Card ---------------- */
  .card {
    width: 100%;
    background: linear-gradient(165deg, rgba(255,255,255,.86), rgba(246,241,255,.82)) padding-box,
                linear-gradient(120deg, rgba(204,0,136,.55), rgba(108,92,231,.55), rgba(26,117,209,.55)) border-box;
    border: 1.5px solid transparent;
    backdrop-filter: blur(14px);
    border-radius: 26px;
    box-shadow: 0 18px 50px -20px rgba(204,0,136,.3), 0 18px 60px -24px rgba(26,117,209,.3);
    padding: clamp(14px, 2.4vh, 26px) 22px clamp(16px, 2.8vh, 34px);
    margin-top: clamp(8px, 1.4vh, 22px);
    animation: enterUp .85s cubic-bezier(.2,.8,.25,1) .18s both;
  }

  /* ---------------- Controls ---------------- */
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px 16px;
    align-items: center; justify-content: center;
  }
  .file-btn {
    display: inline-flex; align-items: center; gap: 9px; cursor: pointer;
    background: #fff; color: var(--purple-deep);
    border: 2px dashed var(--purple);
    padding: 11px 18px; border-radius: 14px; font-weight: 700; font-size: 14px;
    transition: transform .15s, box-shadow .2s, background .2s, border-color .2s;
  }
  .file-btn:hover, .file-btn.drag {
    transform: translateY(-1px); background: #faf8ff;
    border-color: var(--pink); box-shadow: 0 10px 22px rgba(108,92,231,.16);
  }
  .file-btn svg { width: 18px; height: 18px; }
  .file-btn input { display: none; }

  .status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
  }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-faint); flex: none; }
  .status.ok { color: var(--ok); } .status.ok .dot { background: var(--ok); }
  .status.err { color: var(--err); } .status.err .dot { background: var(--err); }

  .count-pill {
    display: inline-block; margin-left: 4px;
    background: linear-gradient(90deg, var(--pink), var(--purple-deep));
    color: #fff; padding: 3px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 700;
  }

  .options {
    display: flex; flex-wrap: wrap; gap: 12px 20px;
    align-items: center; justify-content: center; margin-top: clamp(8px, 1.4vh, 16px);
  }
  .field { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .field select {
    padding: 8px 10px; font-size: 13.5px; font-family: var(--font);
    border: 1.5px solid rgba(155,139,214,.4); border-radius: 10px; background: #fff; color: var(--ink);
  }
  .switch { display: inline-flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; }
  .switch input { position: absolute; opacity: 0; pointer-events: none; }
  .switch .track {
    width: 42px; height: 24px; border-radius: 999px; background: #d7d1ee; position: relative; transition: background .2s; flex: none;
  }
  .switch .track::after {
    content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
    border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.2); transition: transform .2s;
  }
  .switch input:checked + .track { background: linear-gradient(90deg, var(--pink), var(--purple-deep)); }
  .switch input:checked + .track::after { transform: translateX(18px); }

  /* ---------------- Stat tiles ---------------- */
  .stats { display: flex; gap: 14px; justify-content: center; margin-top: clamp(10px, 1.6vh, 20px); flex-wrap: wrap; }
  .stat {
    min-width: 110px; flex: 0 1 150px;
    background: linear-gradient(160deg, #ffffff, #f7f3ff);
    border: 1px solid rgba(155,139,214,.32);
    border-radius: 16px; padding: clamp(8px, 1.4vh, 14px) 18px;
    box-shadow: 0 10px 24px rgba(108,92,231,.12);
  }
  .stat .num {
    font-size: clamp(22px, 3.4vh, 30px); font-weight: 900; line-height: 1;
    background: linear-gradient(90deg, var(--pink), var(--purple-deep));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .stat .lbl { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 6px; font-weight: 700; }

  /* ---------------- Draw button ---------------- */
  .draw-wrap { display: flex; flex-direction: column; align-items: center; margin: clamp(14px, 2.6vh, 34px) 0 6px; }
  .draw-btn {
    position: relative;
    width: clamp(140px, 22vh, 220px); height: clamp(140px, 22vh, 220px); border-radius: 50%;
    border: none; cursor: pointer; color: #fff;
    font-size: clamp(18px, 2.8vh, 24px); font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
    background: radial-gradient(circle at 30% 25%, var(--pink-light), var(--pink) 45%, var(--purple-deep) 100%);
    box-shadow: 0 20px 44px rgba(204,0,136,.36), inset 0 -7px 18px rgba(0,0,0,.16), inset 0 7px 16px rgba(255,255,255,.35);
    transition: transform .15s, filter .2s;
    overflow: hidden;
  }
  .draw-btn span { position: relative; z-index: 2; line-height: 1.15; }
  .draw-btn::after {
    content: ""; position: absolute; inset: -40%;
    background: conic-gradient(from 0deg, transparent 0 68%, rgba(255,255,255,.6) 84%, transparent 100%);
    animation: spin 6s linear infinite; z-index: 1;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .draw-btn:not(:disabled):hover { transform: scale(1.05); }
  .draw-btn:not(:disabled):active { transform: scale(.97); }
  .draw-btn:disabled { cursor: not-allowed; filter: grayscale(.4) opacity(.65); }
  .draw-btn.busy { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 20px 44px rgba(204,0,136,.36), inset 0 -7px 18px rgba(0,0,0,.16); }
    50% { box-shadow: 0 0 0 14px rgba(108,92,231,.12), 0 26px 66px rgba(108,92,231,.5), inset 0 -7px 18px rgba(0,0,0,.16); }
  }

  .hint { margin-top: clamp(8px, 1.4vh, 16px); font-size: 13.5px; color: var(--ink-faint); }

  /* ---------------- Reel + winner ---------------- */
  .stage { margin-top: clamp(10px, 1.6vh, 26px); min-height: clamp(44px, 8vh, 90px); }
  .reel {
    font-size: clamp(22px, 4vh, 44px); font-weight: 800; letter-spacing: 1px;
    color: var(--purple-deep); min-height: clamp(40px, 7vh, 56px);
    display: flex; align-items: center; justify-content: center;
  }
  .reel .cycling {
    background: linear-gradient(120deg, var(--pink-light), var(--pink) 45%, var(--purple-deep));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 2px 10px rgba(204, 0, 136, .25));
    transition: filter .22s ease;
    animation: reelBeat .28s ease-in-out infinite;
  }
  /* Fake-out stop: hold steady and pop once to tease the audience */
  .reel .cycling.fakestop { animation: fakePop .45s cubic-bezier(.2,.85,.3,1.2); }
  @keyframes fakePop {
    0%   { transform: scale(.86); opacity: .5; }
    55%  { transform: scale(1.14); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes reelBeat {
    0%   { transform: scale(1);     opacity: 1;  }
    50%  { transform: scale(1.07);  opacity: .6; }
    100% { transform: scale(1);     opacity: 1;  }
  }

  /* ---------------- Winner modal ---------------- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background:
      radial-gradient(1200px 820px at 50% 28%, rgba(255,91,192,.34), transparent 60%),
      radial-gradient(1000px 720px at 18% 82%, rgba(108,92,231,.34), transparent 60%),
      radial-gradient(1000px 720px at 84% 78%, rgba(26,117,209,.30), transparent 60%),
      rgba(28, 20, 56, .22);
    backdrop-filter: blur(7px) saturate(1.2);
    opacity: 0; visibility: hidden;
    transition: opacity .3s ease, visibility .3s ease;
  }
  .modal-overlay.show { opacity: 1; visibility: visible; }

  .modal {
    position: relative;
    width: min(520px, 92vw);
    background: linear-gradient(165deg, #ffffff, #f4efff) padding-box,
                linear-gradient(120deg, var(--pink), var(--purple-deep), var(--blue)) border-box;
    border: 3px solid transparent;
    border-radius: 28px;
    padding: 44px 34px 38px;
    text-align: center;
    transform: translateY(30px) scale(.9);
    opacity: 0;
    overflow: hidden;
    transition: transform .5s cubic-bezier(.2,.9,.25,1.3), opacity .4s ease;
    animation: glowPulse 2.6s ease-in-out infinite;
  }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); opacity: 1; }
  /* Colorful glow that blends in — no grey shadow */
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 20px 60px -14px rgba(204,0,136,.45), 0 20px 70px -18px rgba(26,117,209,.4); }
    50%     { box-shadow: 0 26px 80px -12px rgba(204,0,136,.6),  0 26px 90px -16px rgba(108,92,231,.55); }
  }
  /* Shine sweep across the card for extra life */
  .modal::after {
    content: ""; position: absolute; top: 0; left: -60%; width: 45%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.55), transparent);
    transform: skewX(-18deg); pointer-events: none; z-index: 3;
    animation: shine 3.6s ease-in-out infinite;
  }
  @keyframes shine { 0% { left: -60%; } 55%, 100% { left: 130%; } }
  .modal .crown { font-size: 52px; line-height: 1; animation: bob 2s ease-in-out infinite; position: relative; z-index: 2; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-8px) rotate(4deg); } }
  .modal .rank {
    font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    color: var(--pink); margin-top: 10px;
    position: relative; z-index: 2;
  }
  .modal .name {
    font-size: clamp(30px, 7vw, 52px); font-weight: 900; margin: 10px 0 4px;
    line-height: 1.25; padding-bottom: .12em;
    background: linear-gradient(90deg, var(--pink), var(--purple-deep), var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    white-space: nowrap; max-width: 100%; overflow: hidden;
    position: relative; z-index: 2;
  }
  .modal .congrats { font-size: 14px; color: var(--ink-soft); margin-top: 4px; position: relative; z-index: 2; }
  .modal .actions { display: flex; gap: 12px; justify-content: center; margin-top: 26px; flex-wrap: wrap; position: relative; z-index: 2; }
  .modal-btn {
    cursor: pointer; border: none; font-family: var(--font);
    font-size: 14px; font-weight: 800; letter-spacing: .3px;
    padding: 12px 22px; border-radius: 999px; transition: transform .15s, box-shadow .2s, filter .2s;
  }
  .modal-btn.primary {
    color: #fff; background: linear-gradient(90deg, var(--pink), var(--purple-deep));
    box-shadow: 0 12px 26px rgba(108,92,231,.35);
  }
  .modal-btn.primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .modal-btn.ghost { color: var(--purple-deep); background: #efeaff; border: 1.5px solid #ddd3ff; }
  .modal-btn.ghost:hover { transform: translateY(-2px); background: #e7dfff; }
  .modal .close {
    position: absolute; top: 14px; right: 16px; z-index: 4;
    width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
    background: #efeaff; color: var(--purple-deep); font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center; transition: background .2s;
  }
  .modal .close:hover { background: #e2d9ff; }

  .footer { margin-top: clamp(10px, 1.8vh, 34px); font-size: 12.5px; color: var(--ink-faint); line-height: 1.6;
    animation: enterUp .85s ease .34s both; }
  .footer strong { color: var(--purple-deep); font-weight: 800; }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 40; }

  /* Top action buttons (fullscreen / reset) */
  .top-actions { position: fixed; top: 14px; right: 16px; z-index: 45; display: flex; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 12px; border: 1px solid rgba(155,139,214,.35);
    background: rgba(255,255,255,.8); backdrop-filter: blur(8px); color: var(--purple-deep);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .2s, box-shadow .2s;
  }
  .icon-btn:hover { transform: translateY(-1px); background: #fff; box-shadow: 0 8px 18px rgba(108,92,231,.18); }
  .icon-btn svg { width: 19px; height: 19px; }
  .icon-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

  @media (max-width: 640px), (max-height: 700px) {
    html, body { height: auto; min-height: 100%; overflow-y: auto; }
    .app {
      height: auto;
      min-height: 100dvh;
      justify-content: flex-start;
      overflow: visible;
      padding: 64px 16px 28px;
      gap: 12px;
    }
    .brand { margin-top: 0; }
  }

  @media (max-width: 520px) {
    .card { padding: 22px 16px 28px; border-radius: 22px; }
    .draw-btn { width: 190px; height: 190px; font-size: 21px; }
  }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="top-actions">
    <button class="icon-btn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
    <button class="icon-btn" id="resetBtn" title="Reset round (clear drawn winners)" aria-label="Reset round" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
      </svg>
    </button>
    <button class="icon-btn" id="fsBtn" title="Fullscreen" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <div class="app">
    <div class="brand">
      <img src="QlipseLogo.png" alt="Qlipse Committee Logo" />
      <h1 class="title">Lucky Draw</h1>
      <p class="subtitle">Philips TVM Fun League '26</p>
    </div>

    <div class="card">
      <div class="controls">
        <label class="file-btn" id="fileBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload the List
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
        </label>
        <div class="status" id="status"><span class="dot"></span><span id="statusText">No list yet — upload the list to begin.</span></div>
      </div>

      <div class="options" id="options" style="display:none;">
        <label class="field">Name column
          <select id="colSelect"></select>
        </label>
        <label class="switch">
          <input type="checkbox" id="excludePrev" checked />
          <span class="track"></span>
          Exclude previous winners
        </label>
      </div>

      <div class="stats" id="stats" style="display:none;">
        <div class="stat"><div class="num" id="countNum">0</div><div class="lbl">Names</div></div>
        <div class="stat"><div class="num" id="remainNum">0</div><div class="lbl">Remaining</div></div>
        <div class="stat"><div class="num" id="drawnNum">0</div><div class="lbl">Drawn</div></div>
      </div>

      <div class="draw-wrap">
        <button class="draw-btn" id="drawBtn" disabled>
          <span>Draw<br>Winner</span>
        </button>
        <div class="hint" id="hint">Upload a list to unlock the draw ✨</div>
      </div>

      <div class="stage">
        <div class="reel" id="reel"></div>
      </div>
    </div>

    <footer class="footer">
      © 2026 <strong>Qlipse Committee</strong> · Philips TVM Fun League '26<br>
      Winners are selected using fair, cryptographically secure random selection.
    </footer>
  </div>

  <!-- Winner modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalName">
      <button class="close" id="modalClose" aria-label="Close">×</button>
      <div class="crown">👑</div>
      <div class="rank">Winner</div>
      <div class="name" id="modalName"></div>
      <div class="congrats">Congratulations! 🎉</div>
      <div class="actions">
        <button class="modal-btn primary" id="modalAgain">Draw Again</button>
        <button class="modal-btn ghost" id="modalDone">Close</button>
      </div>
    </div>
  </div>

<script>
(function () {
  const fileInput  = document.getElementById('fileInput');
  const fileBtn    = document.getElementById('fileBtn');
  const statusEl   = document.getElementById('status');
  const statusText = document.getElementById('statusText');
  const optionsEl  = document.getElementById('options');
  const colSelect  = document.getElementById('colSelect');
  const excludePrev= document.getElementById('excludePrev');
  const statsEl    = document.getElementById('stats');
  const countNum   = document.getElementById('countNum');
  const remainNum  = document.getElementById('remainNum');
  const drawnNum   = document.getElementById('drawnNum');
  const drawBtn    = document.getElementById('drawBtn');
  const hint       = document.getElementById('hint');
  const reel       = document.getElementById('reel');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalName    = document.getElementById('modalName');
  const modalClose   = document.getElementById('modalClose');
  const modalDone    = document.getElementById('modalDone');
  const modalAgain   = document.getElementById('modalAgain');
  const resetBtn     = document.getElementById('resetBtn');
  const fsBtn        = document.getElementById('fsBtn');
  const themeBtn     = document.getElementById('themeBtn');

  let rowsCache = [];
  let dataStart = 1;
  let employees = [];
  let pastWinners = new Set();
  let drawsDone = 0;
  let drawing = false;
  let modalConfettiTimer = null;

  /* -------- File handling (click + drag/drop) -------- */
  fileInput.addEventListener('change', e => e.target.files[0] && handleFile(e.target.files[0]));
  ['dragenter','dragover'].forEach(ev => fileBtn.addEventListener(ev, e => { e.preventDefault(); fileBtn.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev => fileBtn.addEventListener(ev, e => { e.preventDefault(); fileBtn.classList.remove('drag'); }));
  fileBtn.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) handleFile(f); });

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        rowsCache = XLSX.utils.sheet_to_json(sheet, { header: 1, blankrows: false });
        if (!rowsCache.length) throw new Error('empty');

        detectColumns();
        buildPool();
        optionsEl.style.display = 'flex';
        statsEl.style.display = 'flex';
        drawsDone = 0; drawnNum.textContent = '0';
        pastWinners.clear();

        if (employees.length < 1) { setStatus('No names found in the sheet.', 'err'); lockDraw(); return; }
        setStatus('Loaded “' + file.name + '”', 'ok', employees.length);
        resetBtn.disabled = false;
        unlockDraw();
        resetResults();
      } catch (err) {
        console.error(err);
        setStatus('Could not read this file. Use a valid Excel or CSV.', 'err');
        lockDraw();
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function detectColumns() {
    const first = rowsCache[0].map(c => String(c ?? '').trim());
    const lower = first.map(s => s.toLowerCase());
    const looksLikeHeader = lower.some(h => /name|employee|player|participant|full|id|dept|team|email/.test(h));

    colSelect.innerHTML = '';
    const colCount = Math.max(...rowsCache.map(r => r.length));
    for (let c = 0; c < colCount; c++) {
      const label = looksLikeHeader && first[c] ? first[c] : 'Column ' + (c + 1);
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = label;
      colSelect.appendChild(opt);
    }
    let nameCol = lower.findIndex(h => /name|employee|player|participant|full/.test(h));
    if (nameCol === -1) nameCol = 0;
    colSelect.value = nameCol;
    dataStart = looksLikeHeader ? 1 : 0;
  }

  colSelect.addEventListener('change', () => {
    buildPool();
    if (employees.length < 1) { setStatus('Selected column has no names.', 'err'); lockDraw(); }
    else { setStatus('Using column “' + colSelect.options[colSelect.selectedIndex].text + '”', 'ok', employees.length); unlockDraw(); }
    resetResults();
  });

  excludePrev.addEventListener('change', updateStats);

  function buildPool() {
    const col = parseInt(colSelect.value, 10) || 0;
    const seen = new Set(); const out = [];
    for (let i = dataStart; i < rowsCache.length; i++) {
      let val = rowsCache[i]?.[col];
      if (val === undefined || val === null || String(val).trim() === '') {
        val = (rowsCache[i] || []).find(c => c !== undefined && c !== null && String(c).trim() !== '');
      }
      if (val === undefined || val === null) continue;
      const name = String(val).trim();
      if (!name) continue;
      const key = name.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key); out.push(name);
    }
    employees = out;
    updateStats();
  }

  function updateStats() {
    countNum.textContent = employees.length;
    remainNum.textContent = currentPool().length;
  }

  function currentPool() {
    if (!excludePrev.checked) return employees;
    return employees.filter(n => !pastWinners.has(n.toLowerCase()));
  }

  function setStatus(msg, kind, count) {
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
    statusText.innerHTML = msg + (count ? ' <span class="count-pill">' + count + ' names</span>' : '');
  }
  function unlockDraw() { drawBtn.disabled = false; hint.textContent = 'Press the button and let luck decide! ✨'; }
  function lockDraw()   { drawBtn.disabled = true;  hint.textContent = 'Upload a list to unlock the draw ✨'; }
  function resetResults() { reel.textContent = ''; closeModal(); }

  /* -------- Secure random -------- */
  function randInt(max) { const b = new Uint32Array(1); crypto.getRandomValues(b); return b[0] % max; }

  /* -------- Draw a single winner -------- */
  drawBtn.addEventListener('click', async () => {
    if (drawing) return;
    const pool = currentPool();
    if (pool.length < 1) { setStatus('No remaining participants to draw.', 'err'); return; }

    drawing = true;
    drawBtn.disabled = true;
    drawBtn.classList.add('busy');
    hint.textContent = 'Drawing…';

    const winner = pool[randInt(pool.length)];

    reel.innerHTML = '<span class="cycling"></span>';
    const span = reel.querySelector('.cycling');
    await spinReel(span, pool);

    span.classList.remove('cycling');
    reel.textContent = '';
    showWinner(winner);

    pastWinners.add(winner.toLowerCase());
    drawsDone += 1;
    drawnNum.textContent = drawsDone;
    updateStats();

    const remaining = currentPool().length;
    hint.textContent = remaining >= 1 ? 'Press again for another winner 🔁' : 'Everyone has been drawn 🎉';
    drawBtn.classList.remove('busy');
    drawBtn.disabled = remaining < 1;
    drawing = false;
  });

  async function spinReel(el, pool) {
    // Randomized number of fake-out stops so every draw feels different.
    const stops = 1 + Math.floor(Math.random() * 2); // 1 or 2 teases
    for (let i = 0; i < stops; i++) {
      const spinDur = 650 + Math.random() * 550;      // varied spin bursts
      await spinPhase(el, pool, spinDur, 42, 58 + i * 6);
      const hold = 420 + Math.random() * 380 + i * 90; // later teases linger longer
      await fakeStop(el, pool, hold);
    }
    // Final spin, settle (no crawl), then reveal in the modal.
    await spinPhase(el, pool, 1400, 55, 150);
    el.style.filter = '';
  }

  // Cycle blurred random names for a duration; interval eases from a→b.
  function spinPhase(el, pool, duration, startInt, endInt) {
    return new Promise((resolve) => {
      el.classList.remove('fakestop');
      el.style.filter = 'blur(3px)';
      const start = performance.now(); let last = 0;
      function frame(now) {
        const t = (now - start) / duration;
        if (t >= 1) { resolve(); return; }
        const interval = startInt + (endInt - startInt) * t;
        if (now - last >= interval) { el.textContent = pool[randInt(pool.length)]; last = now; }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    });
  }

  // Land on a random (not-the-winner) name, sharpen + pop, hold, then resume.
  function fakeStop(el, pool, holdMs) {
    return new Promise((resolve) => {
      el.textContent = pool[randInt(pool.length)];
      el.style.filter = 'blur(0px)';
      el.classList.remove('fakestop');
      void el.offsetWidth;           // restart the pop animation
      el.classList.add('fakestop');
      setTimeout(() => { el.classList.remove('fakestop'); resolve(); }, holdMs);
    });
  }

  function showWinner(name) {
    modalName.textContent = name;
    modalName.style.fontSize = '';
    modalOverlay.classList.add('show');
    requestAnimationFrame(fitName);
    // One burst on reveal, then a gentle confetti rain while the modal is open.
    clearInterval(modalConfettiTimer);
    burstConfetti();
    modalConfettiTimer = setInterval(spawnRain, 320);
  }

  // Shrink the winner name so it always stays on one clean line.
  function fitName() {
    let size = parseFloat(getComputedStyle(modalName).fontSize);
    const min = 18;
    while (modalName.scrollWidth > modalName.clientWidth && size > min) {
      size -= 1;
      modalName.style.fontSize = size + 'px';
    }
  }

  function closeModal() { modalOverlay.classList.remove('show'); clearInterval(modalConfettiTimer); }

  modalClose.addEventListener('click', closeModal);
  modalDone.addEventListener('click', closeModal);
  modalAgain.addEventListener('click', () => { closeModal(); if (!drawBtn.disabled) setTimeout(() => drawBtn.click(), 250); });
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* -------- Dark mode toggle -------- */
  const moonIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  const sunIcon  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    themeBtn.innerHTML = dark ? sunIcon : moonIcon;
    try { localStorage.setItem('ld-theme', dark ? 'dark' : 'light'); } catch (e) {}
  }
  themeBtn.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));
  applyTheme((() => { try { return localStorage.getItem('ld-theme') === 'dark'; } catch (e) { return false; } })());

  /* -------- Fullscreen (present mode) -------- */
  fsBtn.addEventListener('click', () => {    if (!document.fullscreenElement) {
      (document.documentElement.requestFullscreen && document.documentElement.requestFullscreen());
    } else {
      (document.exitFullscreen && document.exitFullscreen());
    }
  });

  /* -------- Reset the round (clear drawn winners) -------- */
  resetBtn.addEventListener('click', () => {
    if (drawing) return;
    pastWinners.clear();
    drawsDone = 0; drawnNum.textContent = '0';
    updateStats();
    resetResults();
    if (employees.length >= 1) unlockDraw();
    setStatus('Round reset — everyone is back in the draw.', 'ok', employees.length);
  });

  /* -------- Spacebar / Enter to draw -------- */
  document.addEventListener('keydown', e => {
    if (e.key !== ' ' && e.key !== 'Enter') return;
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'select' || tag === 'textarea' || tag === 'button') return;
    if (modalOverlay.classList.contains('show')) return;
    if (drawing || drawBtn.disabled) return;
    e.preventDefault();
    drawBtn.click();
  });

  const wait = ms => new Promise(r => setTimeout(r, ms));
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  /* -------- Confetti -------- */
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  let pieces = [], animating = false;
  const colors = ['#cc0088', '#1a75d1', '#9b8bd6', '#6c5ce7', '#ff5bc0', '#ffd166'];

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();

  function burstConfetti() {
    for (let i = 0; i < 90; i++) {
      pieces.push({
        x: canvas.width / 2 + (Math.random() - .5) * 260,
        y: canvas.height * .34,
        vx: (Math.random() - .5) * 11,
        vy: Math.random() * -13 - 4,
        g: .27 + Math.random() * .12,
        size: 5 + Math.random() * 7,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI, vr: (Math.random() - .5) * .32,
        life: 110 + Math.random() * 50
      });
    }
    if (!animating) { animating = true; requestAnimationFrame(tick); }
  }

  // Gentle confetti rain falling from the top while the winner is shown.
  function spawnRain() {
    if (pieces.length > 160) return; // keep it light — avoid lag
    for (let i = 0; i < 3; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -14,
        vx: (Math.random() - .5) * 1.6,
        vy: 1 + Math.random() * 2,
        g: .04 + Math.random() * .05,
        size: 5 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI, vr: (Math.random() - .5) * .2,
        life: 320
      });
    }
    if (!animating) { animating = true; requestAnimationFrame(tick); }
  }
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*.6);
      ctx.restore();
    });
    pieces = pieces.filter(p => p.life > 0 && p.y < canvas.height + 40);
    if (pieces.length) requestAnimationFrame(tick);
    else { animating = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
})();
</script>
</body>
